<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>農家訪問前 気象チェック</title>
  <meta name="description" content="都道府県ごとの日射量・天気・気温を確認できる農家訪問前チェックアプリ" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <p class="eyebrow">ハウス栽培向け</p>
      <h1>農家訪問前 気象チェック</h1>
      <p class="lead">都道府県（県庁所在地）ごとの直近/予報7日間を比較できます。</p>
    </header>

    <section class="controls card">
      <label>
        都道府県
        <select id="prefectureSelect" aria-label="都道府県"></select>
      </label>
      <label>
        表示期間
        <select id="periodSelect" aria-label="表示期間">
          <option value="past">過去7日</option>
          <option value="future">今後7日</option>
        </select>
      </label>
      <button id="loadButton" type="button">更新</button>
    </section>

    <section id="errorBox" class="error hidden" role="alert"></section>

    <section class="summary-grid">
      <article class="card stat-card">
        <h2>選択地点</h2>
        <p id="selectedPlace">-</p>
      </article>
      <article class="card stat-card">
        <h2>7日間の日射量合計</h2>
        <p><span id="sumRadiation">-</span> MJ/㎡</p>
      </article>
      <article class="card stat-card">
        <h2>1日平均日射量</h2>
        <p><span id="avgRadiation">-</span> MJ/㎡/日</p>
      </article>
      <article class="card stat-card">
        <h2>低日射日数</h2>
        <p><span id="lowRadiationDays">-</span> 日</p>
        <small id="lowRadiationComment"></small>
      </article>
    </section>

    <section class="table-wrap card">
      <h2>日別データ</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>天気</th>
              <th>日射量<br>MJ/㎡/日</th>
              <th>最高気温</th>
              <th>最低気温</th>
              <th>昼平均気温</th>
              <th>夜平均気温</th>
              <th>降水量</th>
              <th>湿度</th>
            </tr>
          </thead>
          <tbody id="weatherTableBody">
            <tr><td colspan="9">データを読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
